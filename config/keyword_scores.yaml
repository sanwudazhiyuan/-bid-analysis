# 关键词得分制配置：每个模块的段落筛选使用加权得分。
# 段落得分 = 匹配到的关键词所属档位分值之和。
# 得分低于 threshold 的段落不纳入筛选。
#
# 档位分值：high=10, medium=5, low=2

tier_scores:
  high: 7
  medium: 4
  low: 2

# 全局最低得分阈值（低于此值的段落不纳入）
global_threshold: 3

# 各模块关键词与得分档位配置
# section_keywords: 章节标题中出现的关键词
# text_keywords: 段落正文中出现的关键词
# tag_keywords: 语义标签匹配的加分（tag 名即关键词，匹配即加分）
# threshold: 本模块最低得分阈值（覆盖 global_threshold）

