name: bid-analyzer

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bid_analyzer
      POSTGRES_USER: biduser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biduser -d bid_analyzer"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    command: uvicorn server.app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://biduser:${DB_PASSWORD:-devpassword}@postgres:5432/bid_analyzer
      REDIS_URL: redis://redis:6379/0
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    volumes:
      - filedata:/data
      - ./src:/app/src
      - ./config:/app/config
      - ./server:/app/server
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      retries: 3

  haha-code:
    build:
      context: ./haha-code
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_AUTH_TOKEN: ${DASHSCOPE_API_KEY:-}
      ANTHROPIC_BASE_URL: https://dashscope.aliyuncs.com/apps/anthropic
      ANTHROPIC_DEFAULT_HAIKU_MODEL: qwen3.5-flash
      ANTHROPIC_DEFAULT_OPUS_MODEL: qwen3.6-plus
      ANTHROPIC_DEFAULT_SONNET_MODEL: qwen3.5-plus
      ANTHROPIC_MODEL: qwen3.6-plus
      API_TIMEOUT_MS: "3000000"
      REVIEW_TIMEOUT_MS: "900000"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      DISABLE_TELEMETRY: "1"
    volumes:
      - filedata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    command: celery -A server.app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://biduser:${DB_PASSWORD:-devpassword}@postgres:5432/bid_analyzer
      REDIS_URL: redis://redis:6379/0
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      HAHA_CODE_URL: http://haha-code:3000
    volumes:
      - filedata:/data
      - ./src:/app/src
      - ./config:/app/config
      - ./server:/app/server
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      haha-code: { condition: service_healthy }

  nginx:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
  filedata:
